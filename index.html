<!DOCTYPE html>
<html lang="id" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andon Dashboard MTC — Cloud Connected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="andon-body text-white">
    <header class="app-header-stack bg-zinc-900">
        <div class="app-header border-b border-zinc-800 relative w-full">
            <div class="flex flex-col gap-2 min-w-0 flex-1 w-full sm:pr-48">
                <span class="app-title text-blue-500 tracking-tighter uppercase">ANDON SYSTEM <span class="text-white">MTC</span></span>
                <p class="text-zinc-500 font-mono leading-tight" style="font-size: clamp(0.68rem, 2vw, 0.92rem); font-weight: 400 !important;">Broker 192.168.210.241:8083 · data Node-RED · semua device</p>
            </div>
            <div id="conn-status" class="app-status text-zinc-500 uppercase shrink-0 w-full sm:w-auto text-left sm:text-right sm:absolute sm:top-1/2 sm:-translate-y-1/2 sm:right-4 sm:top-1/2">INITIALIZING...</div>
        </div>
        <div id="running-text-wrap" class="running-text-wrap px-2" role="region" aria-label="Info berjalan">
            <div class="running-text-inner"></div>
        </div>
    </header>

    <div id="master-container">
        <div class="dashboard-grid" id="dashboard-grid"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
